<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Login e senha</title>
        <link rel="stylesheet" href="ex4style.css">
    </head>
    <body>
        <div>
            <div class="container">
                <h2>Bem vindo na The Brunoou's Corp</h2>
            </div>
        </div>
    </body>
    <input id="usuario" placeholder="Usuário">
<input type="password" id="senha" placeholder="Senha">
<button onclick="entrar()">Entrar</button>

<p id="mensagem"></p>

<script>
function entrar() {
    let usuario = document.getElementById("usuario").value;
    let senha = document.getElementById("senha").value;

    if (usuario == "brunoou" && senha == "13051917") {
        document.getElementById("mensagem").innerText = "Bem-vindo!";
    } else {
        document.getElementById("mensagem").innerText = "Acesso negado!";
    }
}
</script>
</html>
